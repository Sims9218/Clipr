name: Automated Shorts Maker
on:
  schedule:
    - cron: '0 */6 * * *' # Runs every 6 hours
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          # ffmpeg is CRITICAL for merging bestvideo+bestaudio formats
          sudo apt-get install -y ffmpeg imagemagick
          # Fix ImageMagick security policy to allow MoviePy to render subtitles
          sudo sed -i 's/policy domain="path" rights="none" pattern="@\*"/policy domain="path" rights="read|write" pattern="@*"/g' /etc/ImageMagick-6/policy.xml

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Setup Deno (JS Runtime)
        uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x

      - name: Install Python Dependencies
        run: |
          pip install yt-dlp moviepy==1.0.3 openai-whisper torch numpy requests

      - name: Execute Automation
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          YT_COOKIES: ${{ secrets.YT_COOKIES }}
        run: python main.py

      - name: Upload Finished Video (Backup)
        uses: actions/upload-artifact@v4
        with:
          name: short-${{ github.run_id }}
          path: output_short.mp4
          retention-days: 7
